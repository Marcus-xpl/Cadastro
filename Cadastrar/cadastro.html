<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="cadastro.css">
    <link rel="shortcut icon" href="Logo.png.png" type="image/x-icon">
  <title>Cadastro para compras </title>

  <h2>Apple Inc.</h2>
  <h3>Cadrastro pessoal para compra, iremos te retorna o mais rapido possivel.</h3>
  <h4>Atenção: preencha todas as informações necessarias.</h4>
  <h4>O formulário não irá enviar. "é uma simulação"</h4>
</head>
<body>
    
<form action="cadastro.style" method="POST">
<label for="">Nome: </label >
<input type="text" name="nome" placeholder="Digite seu nome" id="nome" class="input" required>
<br/>
<br/>
<label for="">Sobrenome: </label>
<input type="text" name="sobrenome" placeholder="Digite seu sobrenome" id="sobrenome" class="input" required>
<br/>
<br/>
<label for="">E-mail: </label>
<input type="e-mail: " name="email" placeholder="Digite seu e-mail" id="e-mail" class="input" required>
<br/>
<br/>
<label for="">Senha: </label>
<input type="password" name="senha" placeholder="Digite sua senha" id="senha" class="input" required>
<br/>
<br/>
<button class="btn" type="submit" name="btm">Cadastrar</button>

</form>

</body>
</html>
